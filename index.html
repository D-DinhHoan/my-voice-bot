<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Home Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 30px; background-color: #f4f4f9; }
        input { padding: 10px; width: 80%; max-width: 400px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; }
        #btn-speak { padding: 20px 40px; font-size: 24px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #btn-speak:active { background: #218838; }
        #status, #result, #ai-response { margin-top: 20px; font-size: 18px; color: #333; }
        #ai-response { color: #0056b3; font-weight: bold; font-style: italic; }
    </style>
</head>
<body>

    <h1>TRỢ LÝ ẢO AI - SMART HOME</h1>
    <input type="password" id="api-key" placeholder="Dán Gemini API Key vào đây...">
    <br>
    <button id="btn-speak">🎤 BẤM ĐỂ NÓI</button>
    
    <div id="status">MQTT: Đang kết nối...</div>
    <div id="result">Bạn nói: ...</div>
    <div id="ai-response">AI trả lời: ...</div>

    <script>
        // Cấu hình MQTT
        const mqtt_server = "broker.hivemq.com";
        const mqtt_port = 8884; 
        const topic_cmd = "hoan/voice_cmd"; // Kênh gửi lệnh phần cứng
        const topic_tts = "hoan/voice_tts"; // Kênh gửi chữ cho ESP32 đọc
        let mqtt_client;

        function MQTTConnect() {
            let clientID = "Web_AI_" + Math.random().toString(16).substr(2, 8);
            mqtt_client = new Paho.MQTT.Client(mqtt_server, mqtt_port, clientID);
            mqtt_client.onConnectionLost = () => { setTimeout(MQTTConnect, 3000); };
            mqtt_client.connect({ useSSL: true, onSuccess: () => { document.getElementById("status").innerHTML = "MQTT: Đã kết nối mây! ☁️"; document.getElementById("status").style.color = "green"; } });
        }

        function publishMessage(topic, msg) {
            if (mqtt_client && mqtt_client.isConnected()) {
                let message = new Paho.MQTT.Message(msg);
                message.destinationName = topic;
                mqtt_client.send(message);
            }
        }

        // BỘ NÃO GEMINI AI (Bản nâng cấp tự dò lỗi)
        async function askGemini(question) {
            // Dùng trim() để tự động xóa khoảng trắng thừa nếu lỡ copy dính
            let apiKey = document.getElementById("api-key").value.trim(); 
            const resDiv = document.getElementById("ai-response");
            
            if (!apiKey) {
                resDiv.innerHTML = "Lỗi: Bạn chưa nhập API Key!";
                publishMessage(topic_tts, "Vui lòng nhập chìa khóa API trên trang web");
                return;
            }

            resDiv.innerHTML = "AI đang suy nghĩ... 🧠";
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const prompt = "Bạn là trợ lý ảo nhà thông minh. Hãy trả lời thật ngắn gọn dưới 25 chữ, bằng tiếng Việt bình dân: " + question;
            
            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                let json = await response.json();
                
                // Nếu Google từ chối, ép nó in nguyên nhân ra màn hình
                if (!response.ok) {
                    resDiv.innerHTML = "❌ Lỗi từ Google: " + json.error.message;
                    resDiv.style.color = "red";
                    return;
                }
                
                let answer = json.candidates[0].content.parts[0].text;
                answer = answer.replace(/[*#]/g, ''); 
                
                resDiv.innerHTML = "AI: " + answer;
                resDiv.style.color = "#0056b3";
                publishMessage(topic_tts, answer); 

            } catch (e) {
                // Nếu trình duyệt hoặc mạng chặn
                resDiv.innerHTML = "❌ Lỗi kết nối: " + e.message;
                resDiv.style.color = "red";
            }
        }

        // Nhận diện giọng nói
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN';

        const btnSpeak = document.getElementById("btn-speak");
        const resultDiv = document.getElementById("result");

        btnSpeak.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                recognition.start();
                btnSpeak.innerHTML = "🔴 ĐANG NGHE...";
                btnSpeak.style.background = "#dc3545";
            } catch (err) { alert("Chưa cấp quyền Mic!"); }
        };

        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript.toLowerCase();
            resultDiv.innerHTML = "Bạn nói: " + transcript;

            // PHÂN LOẠI LỆNH
            if (transcript.includes("đèn") || transcript.includes("động cơ") || transcript.includes("bơm")) {
                // Nếu là lệnh thiết bị -> Bắn vào kênh CMD
                document.getElementById("ai-response").innerHTML = "Phát hiện lệnh phần cứng ⚙️";
                publishMessage(topic_cmd, transcript);
            } else {
                // Nếu là câu hỏi bình thường -> Hỏi Gemini AI
                askGemini(transcript);
            }
        };

        recognition.onend = () => { btnSpeak.innerHTML = "🎤 BẤM ĐỂ NÓI"; btnSpeak.style.background = "#28a745"; };
        
        MQTTConnect();
    </script>
</body>
</html>
