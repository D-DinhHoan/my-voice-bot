<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background-color: #f4f4f9; }
        #btn-speak { padding: 20px 40px; font-size: 24px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #btn-speak:active { background: #218838; transform: translateY(2px); }
        #status { margin-top: 20px; font-size: 18px; color: #555; }
        #result { margin-top: 20px; font-size: 30px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>HỆ THỐNG ĐIỀU KHIỂN GIỌNG NÓI</h1>
    <button id="btn-speak">🎤 BẤM ĐỂ NÓI</button>
    <div id="status">MQTT: Đang kết nối...</div>
    <div id="result">...</div>

    <script>
        // Cấu hình MQTT (Bắt buộc dùng cổng 8884 cho HTTPS)
        const mqtt_server = "broker.hivemq.com";
        const mqtt_port = 8884; 
        const mqtt_topic = "hoan/voice_cmd";
        let mqtt_client;

        function MQTTConnect() {
            let clientID = "Web_AI_" + Math.random().toString(16).substr(2, 8);
            mqtt_client = new Paho.MQTT.Client(mqtt_server, mqtt_port, clientID);
            
            mqtt_client.onConnectionLost = onConnectionLost;
            
            let options = {
                timeout: 3,
                useSSL: true, // Bắt buộc True trên GitHub Pages
                onSuccess: onConnect,
                onFailure: onFailure
            };
            mqtt_client.connect(options);
        }

        function onConnect() {
            document.getElementById("status").innerHTML = "MQTT: Đã kết nối mây! ☁️";
            document.getElementById("status").style.color = "green";
        }

        function onFailure(message) {
            document.getElementById("status").innerHTML = "MQTT Lỗi: " + message.errorMessage;
            document.getElementById("status").style.color = "red";
            setTimeout(MQTTConnect, 5000);
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                document.getElementById("status").innerHTML = "MQTT Mất kết nối! Đang thử lại...";
                document.getElementById("status").style.color = "orange";
                setTimeout(MQTTConnect, 3000);
            }
        }

        function publishMessage(msg) {
            if (mqtt_client && mqtt_client.isConnected()) {
                let message = new Paho.MQTT.Message(msg);
                message.destinationName = mqtt_topic;
                mqtt_client.send(message);
                console.log("Đã gửi: " + msg);
            }
        }

        // Cấu hình Nhận diện giọng nói
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const btnSpeak = document.getElementById("btn-speak");
        const resultDiv = document.getElementById("result");
        let isListening = false;

        // Ép kiểm tra HTTPS
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            alert("BẢO MẬT: Bạn phải dùng link HTTPS để Micro hoạt động!");
        }

        btnSpeak.onclick = async () => {
            if (isListening) {
                recognition.stop();
                return;
            }

            // Mẹo trên di động: Thử lấy luồng Audio trước để ép trình duyệt hiện bảng hỏi quyền "Cho phép"
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Lấy quyền xong thì tắt luồng này đi, nhường cho SpeechRecognition
                stream.getTracks().forEach(track => track.stop());
                
                // Bây giờ mới khởi động nhận diện
                recognition.start();
                isListening = true;
                btnSpeak.innerHTML = "🔴 ĐANG NGHE...";
                btnSpeak.style.background = "#dc3545";
            } catch (err) {
                alert("Bạn chưa cấp quyền Micro cho trang web này! Hãy bấm vào ổ khóa trên thanh địa chỉ để cấp quyền.");
                console.log("Lỗi quyền Mic: ", err);
            }
        };

        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript;
            resultDiv.innerHTML = "Bạn nói: " + transcript;
            publishMessage(transcript);
        };

        recognition.onend = () => {
            isListening = false;
            btnSpeak.innerHTML = "🎤 BẤM ĐỂ NÓI";
            btnSpeak.style.background = "#28a745";
        };

        recognition.onerror = (event) => {
            if (event.error === 'not-allowed') {
                resultDiv.innerHTML = "LỖI: Trình duyệt đang chặn Micro!";
            } else if (event.error === 'aborted') {
                resultDiv.innerHTML = "Lỗi: Bị ngắt (Do chạm 2 lần hoặc rớt mạng)";
            } else {
                resultDiv.innerHTML = "Lỗi Mic: " + event.error;
            }
            isListening = false;
            btnSpeak.innerHTML = "🎤 BẤM ĐỂ NÓI";
            btnSpeak.style.background = "#28a745";
        };

        // Khởi động kết nối MQTT khi load web
        MQTTConnect();
    </script>
</body>
</html>
