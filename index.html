<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Voice AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #log { background: #eee; text-align: left; padding: 10px; height: 200px; overflow-y: auto; font-size: 12px; margin-top: 20px; border: 1px solid #ccc; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Kiểm tra Robot AI</h2>
    <button id="btn">BẮT ĐẦU NÓI</button>
    
    <div id="log">--- Nhật ký hệ thống ---<br></div>

    <script>
        const logArea = document.getElementById('log');
        function writeLog(msg) {
            logArea.innerHTML += "> " + msg + "<br>";
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 1. Kiểm tra hỗ trợ trình duyệt
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            writeLog("LỖI: Trình duyệt không hỗ trợ Speech API!");
        } else {
            writeLog("OK: Trình duyệt có hỗ trợ Speech API.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN';

        // 2. Cấu hình MQTT (Tạm thời bỏ qua nếu lỗi để test Mic trước)
        writeLog("Đang thử kết nối MQTT...");
        const client = new Paho.MQTT.Client("broker.hivemq.com", Number(8000), "clientId-" + Math.random());
        
        client.connect({
            onSuccess: () => writeLog("MQTT: Đã kết nối thành công!"),
            onFailure: (err) => writeLog("MQTT LỖI: " + err.errorMessage)
        });

        // 3. Sự kiện bấm nút
        document.getElementById('btn').addEventListener('click', function() {
            writeLog("Đã bấm nút. Đang yêu cầu mở Mic...");
            try {
                recognition.start();
            } catch (e) {
                writeLog("LỖI KHI START: " + e.message);
            }
        });

        recognition.onstart = () => writeLog("HỆ THỐNG: Đang nghe... Hãy nói đi!");
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            writeLog("BẠN NÓI: " + text);
            
            // Gửi qua MQTT
            try {
                const message = new Paho.MQTT.Message(text);
                message.destinationName = "hoan/voice_cmd";
                client.send(message);
                writeLog("Đã gửi lệnh lên mây!");
            } catch (e) {
                writeLog("Lỗi gửi MQTT: " + e.message);
            }
        };

        recognition.onerror = (event) => writeLog("LỖI MIC: " + event.error);
        recognition.onend = () => writeLog("HỆ THỐNG: Đã dừng nghe.");
    </script>
</body>
</html>
