<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Home - Pro Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 30px; background-color: #f4f4f9; }
        input { padding: 12px; width: 80%; max-width: 450px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;}
        #btn-speak { padding: 20px 40px; font-size: 24px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        #btn-speak:active { background: #218838; transform: translateY(2px);}
        #status, #result, #ai-response { margin-top: 20px; font-size: 18px; color: #333; }
        #ai-response { color: #0056b3; font-weight: bold; font-style: italic; max-width: 600px; margin: 20px auto; line-height: 1.5;}
    </style>
</head>
<body>

    <h1>TRỢ LÝ ẢO AI - SMART HOME</h1>
    <input type="password" id="api-key" placeholder="Dán Gemini API Key vào đây...">
    <br>
    <button id="btn-speak">🎤 BẤM ĐỂ NÓI</button>
    
    <div id="status">MQTT: Đang kết nối...</div>
    <div id="result">Bạn nói: ...</div>
    <div id="ai-response">AI: ...</div>

    <script>
        const mqtt_server = "broker.hivemq.com";
        const mqtt_port = 8884; 
        const topic_cmd = "hoan/voice_cmd"; 
        const topic_tts = "hoan/voice_tts"; 
        let mqtt_client;

        let speechQueue = [];
        let isSpeaking = false;

        function processSpeechQueue() {
            if (isSpeaking || speechQueue.length === 0) return;
            isSpeaking = true;
            let textChunk = speechQueue.shift();
            publishMessage(topic_tts, textChunk);
            let delayTime = (textChunk.split(" ").length * 350) + 1000; 
            setTimeout(() => { isSpeaking = false; processSpeechQueue(); }, delayTime);
        }

        function MQTTConnect() {
            let clientID = "Web_AI_" + Math.random().toString(16).substr(2, 8);
            mqtt_client = new Paho.MQTT.Client(mqtt_server, mqtt_port, clientID);
            mqtt_client.onConnectionLost = () => { setTimeout(MQTTConnect, 3000); };
            mqtt_client.connect({ useSSL: true, onSuccess: () => { document.getElementById("status").innerHTML = "MQTT: Đã kết nối mây! ☁️"; document.getElementById("status").style.color = "green"; } });
        }

        function publishMessage(topic, msg) {
            if (mqtt_client && mqtt_client.isConnected()) {
                let message = new Paho.MQTT.Message(msg);
                message.destinationName = topic;
                mqtt_client.send(message);
            }
        }

        async function askGemini(question) {
            let apiKey = document.getElementById("api-key").value.trim(); 
            const resDiv = document.getElementById("ai-response");
            
            if (!apiKey) {
                resDiv.innerHTML = "Lỗi: Bạn chưa dán API Key!"; resDiv.style.color = "red"; return;
            }

            resDiv.innerHTML = "AI đang suy nghĩ... 🧠🌍";
            resDiv.style.color = "#856404";
            
            const now = new Date();
            const todayStr = now.toLocaleString('vi-VN'); 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const prompt = `Bạn là trợ lý ảo nhà thông minh. Dữ liệu thời gian thực là: ${todayStr}. Trả lời câu hỏi sau thật ngắn gọn dưới 40 chữ, bằng tiếng Việt: ` + question;
            
            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], tools: [{ googleSearch: {} }] })
                });
                let json = await response.json();
                if (!response.ok) { resDiv.innerHTML = "❌ Lỗi: " + json.error.message; resDiv.style.color = "red"; return; }
                
                let answer = json.candidates[0].content.parts[0].text.replace(/[*#]/g, ''); 
                resDiv.innerHTML = "AI: " + answer; resDiv.style.color = "#0056b3";
                
                let chunks = answer.match(/[^.?!,]+[.?!,]*/g) || [answer];
                for(let chunk of chunks) if(chunk.trim().length > 0) speechQueue.push(chunk.trim());
                processSpeechQueue(); 
            } catch (e) { resDiv.innerHTML = "❌ Lỗi mạng: " + e.message; resDiv.style.color = "red"; }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN';

        const btnSpeak = document.getElementById("btn-speak");
        const resultDiv = document.getElementById("result");

        btnSpeak.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                recognition.start();
                btnSpeak.innerHTML = "🔴 ĐANG NGHE...";
                btnSpeak.style.background = "#dc3545";
            } catch (err) { alert("Chưa cấp quyền Mic!"); }
        };

        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript.toLowerCase().trim();
            resultDiv.innerHTML = "Bạn nói: " + transcript;

            // NÂNG CẤP 1: KIỂM TRA TỪ KHÓA "GOOGLE" ĐỂ GỌI AI
            if (transcript.startsWith("google")) {
                let question = transcript.replace("google", "").trim();
                if (question.length === 0) question = "Bạn có thể giúp gì cho tôi?";
                askGemini(question);
            } 
            // NÂNG CẤP 2: LỆNH PHẦN CỨNG + LỆNH PHÁT NHẠC
            else if (transcript.includes("đèn") || transcript.includes("động cơ") || transcript.includes("bơm") || transcript.includes("cả 3") || transcript.includes("tất cả") || transcript.includes("cả ba") || transcript.includes("nhạc")) {
                document.getElementById("ai-response").innerHTML = "Đang thực thi lệnh hệ thống ⚙️🎵";
                document.getElementById("ai-response").style.color = "green";
                publishMessage(topic_cmd, transcript); // Gửi nguyên câu nói xuống ESP32
            } 
            // NÂNG CẤP 3: KHÔNG PHẢI AI, CŨNG KHÔNG PHẢI LỆNH -> BÁO LỖI
            else {
                document.getElementById("ai-response").innerHTML = "Không rõ yêu cầu ❌";
                document.getElementById("ai-response").style.color = "red";
                publishMessage(topic_cmd, "khong_ro_yeu_cau"); 
            }
        };

        recognition.onend = () => { btnSpeak.innerHTML = "🎤 BẤM ĐỂ NÓI"; btnSpeak.style.background = "#28a745"; };
        
        MQTTConnect();
    </script>
</body>
</html>
